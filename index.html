<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Monitor — Real-time Dashboard</title>
<style>
:root {
  --bg:       #050e1d;
  --bg2:      #081529;
  --card:     #0d1b2e;
  --card2:    #111f35;
  --border:   #1a2d4a;
  --border2:  #243a5e;
  --saffron:  #FF9933;
  --saff-dim: rgba(255,153,51,0.12);
  --green:    #22c55e;
  --red:      #ef4444;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --muted2:   #94a3b8;
  --mono: ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  --sans: -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;}

/* ── Header ── */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.hdr-l{display:flex;align-items:center;gap:12px;}
.hdr-flag{font-size:22px;}
.hdr-title{font-size:17px;font-weight:700;letter-spacing:-0.02em;}
.hdr-title em{color:var(--saffron);font-style:normal;}
.hdr-sub{font-family:var(--mono);font-size:10px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-top:1px;}
.hdr-r{display:flex;align-items:center;gap:12px;}
.hdr-time{font-family:var(--mono);font-size:11px;color:var(--muted);}
.hdr-cd{font-family:var(--mono);font-size:10px;color:var(--muted);}
.btn-refresh{background:var(--saff-dim);border:1px solid var(--saffron);color:var(--saffron);font-family:var(--mono);font-size:11px;font-weight:700;padding:6px 13px;border-radius:6px;cursor:pointer;text-transform:uppercase;letter-spacing:0.05em;transition:background 0.15s;}
.btn-refresh:hover{background:rgba(255,153,51,0.22);}
.btn-refresh:disabled{opacity:0.5;cursor:not-allowed;}

/* ── Ticker ── */
.ticker-wrap{background:var(--bg2);border-bottom:1px solid var(--border);overflow:hidden;height:32px;display:flex;align-items:center;}
.ticker-track{display:flex;animation:ticker 80s linear infinite;white-space:nowrap;}
.ticker-track:hover{animation-play-state:paused;}
@keyframes ticker{0%{transform:translateX(0);}100%{transform:translateX(-50%);}}
.t-item{display:inline-flex;align-items:center;gap:6px;padding:0 22px;font-family:var(--mono);font-size:11.5px;border-right:1px solid var(--border);}
.t-lbl{color:var(--muted2);}
.t-val{color:var(--text);font-weight:700;}
.t-chg{font-weight:600;}
.up{color:var(--green);}
.down{color:var(--red);}

/* ── Grid ── */
.main{padding:18px 20px 40px;display:grid;gap:14px;grid-template-columns:repeat(3,1fr);max-width:1360px;margin:0 auto;}
.s2{grid-column:span 2;}
.s3{grid-column:span 3;}

/* ── Card ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.card-hdr{padding:11px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:var(--card2);}
.card-title{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:var(--saffron);}
.card-badge{font-family:var(--mono);font-size:9px;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted);background:var(--border);padding:2px 7px;border-radius:4px;}
.card-body{padding:14px 16px;}

/* ── Skeleton ── */
.sk{background:linear-gradient(90deg,var(--border) 25%,var(--border2) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:6px;}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ── Markets ── */
.mkt-row{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
.mkt-row:last-child{border-bottom:none;}
.mkt-name{font-size:13px;font-weight:700;}
.mkt-sub{font-size:10.5px;color:var(--muted);margin-top:2px;}
.mkt-price{font-family:var(--mono);font-size:19px;font-weight:700;text-align:right;}
.mkt-chg{font-family:var(--mono);font-size:11.5px;font-weight:600;text-align:right;margin-top:3px;}

/* ── Shared row ── */
.data-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.data-row:last-child{border-bottom:none;}
.data-name{font-size:12.5px;font-weight:700;}
.data-sub{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px;}
.data-r{text-align:right;}
.data-price{font-family:var(--mono);font-size:14px;font-weight:700;}
.data-chg{font-family:var(--mono);font-size:11px;font-weight:600;margin-top:2px;}

/* ── Forex ── */
.fx-pair{font-family:var(--mono);font-size:12.5px;color:var(--muted2);font-weight:700;}
.fx-rate{font-family:var(--mono);font-size:16px;font-weight:700;text-align:right;}
.fx-note{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:2px;text-align:right;}

/* ── Crypto ── */
.cx-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);}
.cx-row:last-child{border-bottom:none;}
.cx-l{display:flex;align-items:center;gap:9px;}
.cx-icon{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.cx-name{font-size:12.5px;font-weight:700;}
.cx-sym{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px;}
.cx-r{text-align:right;}
.cx-price{font-family:var(--mono);font-size:13px;font-weight:700;}
.cx-chg{font-family:var(--mono);font-size:11px;font-weight:600;margin-top:2px;}

/* ── Weather ── */
.wx-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
.wx-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px 10px;text-align:center;}
.wx-city{font-size:11px;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.wx-emoji{font-size:32px;margin-bottom:6px;line-height:1;}
.wx-temp{font-family:var(--mono);font-size:24px;font-weight:700;}
.wx-desc{font-size:11px;color:var(--muted);margin-top:5px;line-height:1.35;}
.wx-meta{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:8px;display:flex;justify-content:center;gap:10px;}

/* ── News ── */
.news-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.news-src-lbl{font-family:var(--mono);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.1em;color:var(--saffron);padding-bottom:9px;border-bottom:1px solid var(--border);margin-bottom:2px;}
.news-item{padding:8px 0;border-bottom:1px solid var(--border);}
.news-item:last-child{border-bottom:none;}
.news-item a{font-size:12.5px;line-height:1.45;color:var(--text);text-decoration:none;display:block;}
.news-item a:hover{color:var(--saffron);}
.news-meta{font-family:var(--mono);font-size:9.5px;color:var(--muted);margin-top:4px;}

/* ── Section wrapper ── */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.section-body{padding:16px;}

/* ── Error ── */
.err{color:var(--red);font-family:var(--mono);font-size:11.5px;padding:12px 0;text-align:center;}

/* ── Responsive ── */
@media(max-width:960px){
  .main{grid-template-columns:1fr 1fr;}
  .s2,.s3{grid-column:span 2;}
  .wx-grid{grid-template-columns:repeat(2,1fr);}
  .news-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:600px){
  .main{grid-template-columns:1fr;padding:12px 12px 32px;}
  .s2,.s3{grid-column:span 1;}
  .wx-grid{grid-template-columns:repeat(2,1fr);}
  .news-grid{grid-template-columns:1fr;}
  .hdr-sub,.hdr-cd{display:none;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <span class="hdr-flag">🇮🇳</span>
    <div>
      <div class="hdr-title">India <em>Monitor</em></div>
      <div class="hdr-sub">Real-time dashboard</div>
    </div>
  </div>
  <div class="hdr-r">
    <span class="hdr-time" id="hdr-time">—</span>
    <span class="hdr-cd"  id="hdr-cd"></span>

  </div>
</header>

<div class="ticker-wrap"><div class="ticker-track" id="ticker"></div></div>

<div class="main">

  <!-- Markets (span 2) -->
  <div class="card s2">
    <div class="card-hdr">
      <span class="card-title">📈 Indian Markets</span>
      <span class="card-badge">NSE · BSE</span>
    </div>
    <div class="card-body" id="markets-body">

  <!-- Crypto -->
  <div class="card">

    <div class="card-body" id="crypto-body">
      <div class="sk" style="height:44px;margin-bottom:10px;"></div>

  <!-- Forex -->
  <div class="card">
    <div class="card-hdr">

  <!-- Top Stocks -->
  <div class="card">

      <div class="sk" style="height:40px;margin-bottom:10px;"></div>
      <div class="sk" style="height:40px;margin-bottom:10px;"></div>

<script>
const RAW = url => 'https://api.allorigins.win/raw?url=' + encodeURIComponent(url);
const GET = url => 'https://api.allorigins.win/get?url='  + encodeURIComponent(url);

// ── Formatters ────────────────────────────────────────────
function fmtINR(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e7) return '₹' + (n / 1e7).toFixed(2) + ' Cr';
  if (n >= 1e5) return '₹' + (n / 1e5).toFixed(2) + ' L';
  return '₹' + new Intl.NumberFormat('en-IN').format(Math.round(n));
}
function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('en-IN').format(Math.round(n));
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function cls(n)   { return n == null ? '' : (n >= 0 ? 'up' : 'down'); }
function arrow(n) { return n == null ? '' : (n >= 0 ? ' ▲' : ' ▼'); }

function wxEmoji(desc) {
  const d = (desc || '').toLowerCase();
  if (d.includes('thunder') || d.includes('storm'))          return '⛈️';
  if (d.includes('heavy rain') || d.includes('torrential'))  return '🌧️';
  if (d.includes('drizzle') || d.includes('light rain'))     return '🌦️';
  if (d.includes('rain') || d.includes('shower'))            return '🌧️';
  if (d.includes('fog') || d.includes('mist') || d.includes('haz')) return '🌫️';
  if (d.includes('snow'))                                    return '❄️';
  if (d.includes('partly') || d.includes('overcast'))        return '⛅';
  if (d.includes('cloud'))                                   return '☁️';
  if (d.includes('sun') || d.includes('clear'))              return '☀️';
  return '🌡️';
}

function relTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return '';
  const m = Math.round((Date.now() - d) / 60000);
  if (m < 2)    return 'just now';
  if (m < 60)   return m + 'm ago';
  if (m < 1440) return Math.round(m / 60) + 'h ago';
  return Math.round(m / 1440) + 'd ago';
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

// ── Fetch helpers ─────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}

async function fetchRSS(feedUrl) {
  const res  = await fetch(GET(feedUrl));
  const data = await res.json();
  const xml  = new DOMParser().parseFromString(data.contents, 'text/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML parse error');
  const items = xml.querySelectorAll('item');
  const out = [];
  items.forEach(item => {
    const title = item.querySelector('title')?.textContent?.trim();
    let link = item.querySelector('link')?.textContent?.trim()
            || item.querySelector('link')?.getAttribute('href')
            || item.querySelector('guid')?.textContent?.trim()
            || '';
    // Fallback: regex scan for link text (handles oddly-placed nodes)
    if (!link) {
      const m = item.innerHTML.match(/<link[^>]*>([^<]+)<\/link>/i);
      if (m) link = m[1].trim();
    }
    const pub = item.querySelector('pubDate')?.textContent?.trim() || '';
    if (title && title.length > 5) out.push({ title, link, pub });
  });
  return out.slice(0, 7);
}

// ── API loaders ───────────────────────────────────────────
function loadYahooQuotes(symbols) {
  return fetchJSON(RAW(
    'https://query1.finance.yahoo.com/v7/finance/quote?symbols=' + symbols
  )).then(d => d.quoteResponse?.result || []);
}

async function loadForex() {
  // from=INR gives: 1 INR = X foreign. Invert → 1 foreign = Y INR
  const d = await fetchJSON('https://api.frankfurter.app/latest?from=INR&to=USD,EUR,GBP,JPY,AED');
  const out = {};
  for (const [cur, rate] of Object.entries(d.rates || {})) out[cur] = 1 / rate;
  return out;
}

function loadCrypto() {
  return fetchJSON(
    'https://api.coingecko.com/api/v3/simple/price' +
    '?ids=bitcoin,ethereum,binancecoin,ripple' +
    '&vs_currencies=inr&include_24hr_change=true'
  );
}

function loadWeather(city) {
  return fetchJSON(RAW('https://wttr.in/' + encodeURIComponent(city) + '?format=j1'))
    .then(d => {
      const c = d.current_condition[0];
      return { temp: c.temp_C, feels: c.FeelsLikeC, humidity: c.humidity, desc: c.weatherDesc[0].value, wind: c.windspeedKmph };
    });
}

// ── Renderers ─────────────────────────────────────────────
function renderMarkets(rows) {
  const names = { '^NSEI': 'NIFTY 50',  '^BSESN': 'SENSEX' };
  const subs  = { '^NSEI': 'National Stock Exchange', '^BSESN': 'Bombay Stock Exchange' };
  document.getElementById('markets-body').innerHTML = rows.length
    ? rows.map(m => {
        const pct = m.regularMarketChangePercent, chg = m.regularMarketChange;
        return `<div class="mkt-row">
          <div>
            <div class="mkt-name">${esc(names[m.symbol] || m.shortName)}</div>
            <div class="mkt-sub">${esc(subs[m.symbol] || m.symbol)}</div>
          </div>
          <div>
            <div class="mkt-price">${fmtNum(m.regularMarketPrice)}</div>
            <div class="mkt-chg ${cls(pct)}">${chg >= 0 ? '+' : ''}${fmtNum(chg)} (${fmtPct(pct)})${arrow(pct)}</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="err">Market data unavailable.</div>';
}

function renderStocks(rows) {
  document.getElementById('stocks-body').innerHTML = rows.length
    ? rows.map(s => {
        const pct  = s.regularMarketChangePercent;
        const name = (s.shortName || s.symbol || '').replace(' NSE', '');
        return `<div class="data-row">
          <div>
            <div class="data-name">${esc(name)}</div>
            <div class="data-sub">${esc(s.symbol?.replace('.NS', '') || '')}</div>
          </div>
          <div class="data-r">
            <div class="data-price">₹${fmtNum(s.regularMarketPrice)}</div>
            <div class="data-chg ${cls(pct)}">${fmtPct(pct)}${arrow(pct)}</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="err">Stock data unavailable.</div>';
}

function renderForex(pairs) {
  const cfg = [
    { key: 'USD', flag: '🇺🇸', label: 'US Dollar'       },
    { key: 'EUR', flag: '🇪🇺', label: 'Euro'             },
    { key: 'GBP', flag: '🇬🇧', label: 'British Pound'    },
    { key: 'JPY', flag: '🇯🇵', label: 'Japanese Yen'     },
    { key: 'AED', flag: '🇦🇪', label: 'UAE Dirham'       },
  ];
  document.getElementById('forex-body').innerHTML = cfg.map(c => {
    const rate = pairs[c.key];
    return `<div class="data-row">
      <div class="fx-pair">${c.flag} ${c.key}/INR</div>
      <div>
        <div class="fx-rate">₹${rate ? rate.toFixed(2) : '—'}</div>
        <div class="fx-note">1 ${c.key} = ₹${rate ? rate.toFixed(2) : '—'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCrypto(data) {
  const cfg = [
    { id: 'bitcoin',     name: 'Bitcoin',  sym: 'BTC', icon: '🟠', bg: 'rgba(247,147,26,0.18)'  },
    { id: 'ethereum',    name: 'Ethereum', sym: 'ETH', icon: '🔵', bg: 'rgba(98,126,234,0.18)'   },
    { id: 'binancecoin', name: 'BNB',      sym: 'BNB', icon: '🟡', bg: 'rgba(240,185,11,0.18)'   },
    { id: 'ripple',      name: 'XRP',      sym: 'XRP', icon: '⚫', bg: 'rgba(100,100,100,0.18)'  },
  ];
  document.getElementById('crypto-body').innerHTML = cfg.map(c => {
    const d = data[c.id]; if (!d) return '';
    const pct = d.inr_24h_change;
    return `<div class="cx-row">
      <div class="cx-l">
        <div class="cx-icon" style="background:${c.bg}">${c.icon}</div>
        <div><div class="cx-name">${c.name}</div><div class="cx-sym">${c.sym}</div></div>
      </div>
      <div class="cx-r">
        <div class="cx-price">${fmtINR(d.inr)}</div>
        <div class="cx-chg ${cls(pct)}">${fmtPct(pct)}${arrow(pct)}</div>
      </div>
    </div>`;
  }).join('');
}

function renderCommodities(rows, usdInr) {
  const labels = { 'GC=F': '🥇 Gold (per oz)', 'SI=F': '🥈 Silver (per oz)', 'CL=F': '🛢️ Crude Oil (bbl)' };
  document.getElementById('commodity-body').innerHTML = rows.length
    ? rows.map(c => {
        const pct      = c.regularMarketChangePercent;
        const priceUsd = c.regularMarketPrice;
        const priceInr = usdInr && priceUsd ? priceUsd * usdInr : null;
        return `<div class="data-row">
          <div>
            <div class="data-name">${esc(labels[c.symbol] || c.symbol)}</div>
            <div class="data-sub">$${priceUsd?.toFixed(2) || '—'} USD</div>
          </div>
          <div class="data-r">
            <div class="data-price">${priceInr ? '₹' + fmtNum(priceInr) : '—'}</div>
            <div class="data-chg ${cls(pct)}">${fmtPct(pct)}${arrow(pct)}</div>
          </div>
        </div>`;
      }).join('')
    : '<div class="err">Commodity data unavailable.</div>';
}

function renderWeather(results) {
  document.getElementById('weather-grid').innerHTML = results.map(({ city, data }) =>
    data
      ? `<div class="wx-card">
          <div class="wx-city">${esc(city)}</div>
          <div class="wx-emoji">${wxEmoji(data.desc)}</div>
          <div class="wx-temp">${data.temp}°C</div>
          <div class="wx-desc">${esc(data.desc)}</div>
          <div class="wx-meta"><span>💧${data.humidity}%</span><span>💨${data.wind} km/h</span></div>
        </div>`
      : `<div class="wx-card">
          <div class="wx-city">${esc(city)}</div>
          <div class="wx-emoji">❓</div>
          <div class="wx-desc" style="color:var(--red)">Unavailable</div>
        </div>`
  ).join('');
}

function renderNews(sources) {
  document.getElementById('news-grid').innerHTML = sources.map(({ label, items }) =>
    `<div>
      <div class="news-src-lbl">${esc(label)}</div>
      ${items?.length
        ? items.map(it => `<div class="news-item">
            <a href="${esc(it.link)}" target="_blank" rel="noopener">${esc(it.title)}</a>
            <div class="news-meta">${relTime(it.pub)}</div>
          </div>`).join('')
        : '<div class="err">Feed unavailable.</div>'
      }
    </div>`
  ).join('');
}

function renderTicker(markets, forex, crypto) {
  const items = [];
  markets.forEach(m => {
    const pct = m.regularMarketChangePercent;
    items.push(`<span class="t-item">
      <span class="t-lbl">${esc(m.shortName || m.symbol)}</span>
      <span class="t-val">${fmtNum(m.regularMarketPrice)}</span>
      <span class="t-chg ${cls(pct)}">${fmtPct(pct)}${arrow(pct)}</span>
    </span>`);
  });
  const fxShow = { USD: '🇺🇸 USD', EUR: '🇪🇺 EUR', GBP: '🇬🇧 GBP', AED: '🇦🇪 AED' };
  Object.entries(forex).forEach(([cur, rate]) => {
    if (!fxShow[cur]) return;
    items.push(`<span class="t-item">
      <span class="t-lbl">${fxShow[cur]}/INR</span>
      <span class="t-val">₹${rate.toFixed(2)}</span>
    </span>`);
  });
  const cxMeta = { bitcoin: { sym: 'BTC', icon: '🟠' }, ethereum: { sym: 'ETH', icon: '🔵' } };
  Object.entries(crypto).forEach(([id, d]) => {
    const m = cxMeta[id]; if (!m) return;
    const pct = d.inr_24h_change;
    items.push(`<span class="t-item">
      <span class="t-lbl">${m.icon} ${m.sym}/INR</span>
      <span class="t-val">${fmtINR(d.inr)}</span>
      <span class="t-chg ${cls(pct)}">${fmtPct(pct)}</span>
    </span>`);
  });
  document.getElementById('ticker').innerHTML = items.join('') + items.join('');
}

// ── Countdown ─────────────────────────────────────────────
let cdTimer;
function startCountdown(secs) {
  clearInterval(cdTimer);
  let s = secs;
  const el = document.getElementById('hdr-cd');
  el.textContent = 'Refresh in ' + s + 's';
  cdTimer = setInterval(() => {
    s--;
    el.textContent = s > 0 ? 'Refresh in ' + s + 's' : '';
    if (s <= 0) { clearInterval(cdTimer); refresh(); }
  }, 1000);
}

// ── Main ──────────────────────────────────────────────────
let busy = false;
async function refresh() {
  if (busy) return;
  busy = true;
  clearInterval(cdTimer);
  document.getElementById('hdr-cd').textContent = 'Loading…';
  document.getElementById('btn-refresh').disabled = true;

  const safe = p => p.catch(() => null);

  const [
    markets, stocks, forex, crypto, commodities,
    wxDelhi, wxMumbai, wxBengaluru, wxChennai,
    ndtv, et, hindu
  ] = await Promise.all([
    loadYahooQuotes('%5ENSEI,%5EBSESN')                              .catch(() => []),
    loadYahooQuotes('RELIANCE.NS,TCS.NS,HDFCBANK.NS,INFY.NS,WIPRO.NS').catch(() => []),
    loadForex()                                                       .catch(() => ({})),
    loadCrypto()                                                      .catch(() => ({})),
    loadYahooQuotes('GC%3DF,SI%3DF,CL%3DF')                         .catch(() => []),
    safe(loadWeather('Delhi')),
    safe(loadWeather('Mumbai')),
    safe(loadWeather('Bengaluru')),
    safe(loadWeather('Chennai')),
    safe(fetchRSS('https://feeds.feedburner.com/ndtvnews-india-news')),
    safe(fetchRSS('https://economictimes.indiatimes.com/rssfeedsdefault.cms')),
    safe(fetchRSS('https://www.thehindu.com/news/national/?service=rss')),
  ]);

  renderMarkets(markets);
  renderStocks(stocks);
  renderForex(forex);
  renderCrypto(crypto);
  renderCommodities(commodities, forex.USD);
  renderWeather([
    { city: 'Delhi',     data: wxDelhi     },
    { city: 'Mumbai',    data: wxMumbai    },
    { city: 'Bengaluru', data: wxBengaluru },
    { city: 'Chennai',   data: wxChennai   },
  ]);
  renderNews([
    { label: 'NDTV India',     items: ndtv  },
    { label: 'Economic Times', items: et    },
    { label: 'The Hindu',      items: hindu },
  ]);
  try { renderTicker(markets, forex, crypto); } catch (_) {}

  document.getElementById('hdr-time').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  busy = false;
  document.getElementById('btn-refresh').disabled = false;
  startCountdown(60);
}

refresh();
</script>
