<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>India Monitor — Real-time Dashboard</title>
<style>
:root {
  --bg:        #02080f;
  --bg2:       #040d18;
  --card:      rgba(10,22,40,0.85);
  --card2:     rgba(15,30,55,0.9);
  --border:    rgba(255,153,51,0.12);
  --border2:   rgba(255,153,51,0.22);
  --saffron:   #FF9933;
  --saffron2:  #ffb347;
  --igreen:    #138808;
  --igreen2:   #1db510;
  --green:     #22c55e;
  --red:       #f43f5e;
  --blue:      #38bdf8;
  --text:      #f0f4f8;
  --muted:     #5a6a7e;
  --muted2:    #8099b4;
  --mono: ui-monospace,'SFMono-Regular',Menlo,Consolas,monospace;
  --sans: 'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  background-image:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(255,153,51,0.08) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 90% 80%, rgba(19,136,8,0.06) 0%, transparent 60%);
}

/* ── Dot grid overlay ── */
body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image: radial-gradient(rgba(255,153,51,0.07) 1px, transparent 1px);
  background-size: 28px 28px;
  pointer-events:none;
  z-index:0;
}

/* ── Header ── */
.hdr {
  position: sticky;
  top: 0;
  z-index: 200;
  background: rgba(2,8,15,0.85);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 58px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.hdr::after {
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:1px;
  background: linear-gradient(90deg, transparent, var(--saffron), var(--igreen2), transparent);
  opacity:0.4;
}
.hdr-l { display:flex; align-items:center; gap:14px; }
.hdr-logo {
  width:36px; height:36px; border-radius:10px;
  background: linear-gradient(135deg, var(--saffron), var(--igreen));
  display:flex; align-items:center; justify-content:center;
  font-size:18px; flex-shrink:0;
  box-shadow: 0 0 18px rgba(255,153,51,0.3);
}
.hdr-title { font-size:18px; font-weight:800; letter-spacing:-0.03em; }
.hdr-title em {
  font-style:normal;
  background: linear-gradient(90deg, var(--saffron), var(--saffron2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.hdr-sub { font-family:var(--mono); font-size:9.5px; text-transform:uppercase; letter-spacing:0.14em; color:var(--muted); margin-top:1px; }
.hdr-r { display:flex; align-items:center; gap:14px; }
.live-dot {
  display:flex; align-items:center; gap:6px;
  font-family:var(--mono); font-size:10px; color:var(--green);
  text-transform:uppercase; letter-spacing:0.1em;
}
.live-dot::before {
  content:'';
  width:7px; height:7px; border-radius:50%;
  background:var(--green);
  box-shadow: 0 0 8px var(--green);
  animation: blink 2s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0.3;} }
.hdr-time { font-family:var(--mono); font-size:11px; color:var(--muted2); }
.hdr-cd   { font-family:var(--mono); font-size:10px; color:var(--muted); }
.btn-refresh {
  background: rgba(255,153,51,0.1);
  border: 1px solid rgba(255,153,51,0.35);
  color: var(--saffron);
  font-family:var(--mono); font-size:11px; font-weight:700;
  padding: 7px 14px; border-radius:8px; cursor:pointer;
  text-transform:uppercase; letter-spacing:0.06em;
  transition: all 0.2s;
  box-shadow: 0 0 12px rgba(255,153,51,0.1);
}
.btn-refresh:hover { background:rgba(255,153,51,0.2); box-shadow:0 0 20px rgba(255,153,51,0.25); }
.btn-refresh:disabled { opacity:0.4; cursor:not-allowed; box-shadow:none; }

/* ── Ticker ── */
.ticker-wrap {
  background: rgba(4,13,24,0.9);
  border-bottom: 1px solid var(--border);
  overflow:hidden; height:34px;
  display:flex; align-items:center;
  position:relative; z-index:1;
}
.ticker-wrap::before,.ticker-wrap::after {
  content:''; position:absolute; top:0; bottom:0; width:60px; z-index:2; pointer-events:none;
}
.ticker-wrap::before { left:0; background:linear-gradient(90deg,var(--bg2),transparent); }
.ticker-wrap::after  { right:0; background:linear-gradient(-90deg,var(--bg2),transparent); }
.ticker-track { display:flex; animation:ticker 90s linear infinite; white-space:nowrap; }
.ticker-track:hover { animation-play-state:paused; }
@keyframes ticker { 0%{transform:translateX(0);} 100%{transform:translateX(-50%);} }
.t-item {
  display:inline-flex; align-items:center; gap:7px;
  padding: 0 20px;
  font-family:var(--mono); font-size:11.5px;
  border-right: 1px solid rgba(255,153,51,0.08);
}
.t-dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
.t-lbl { color:var(--muted2); font-weight:500; }
.t-val { color:var(--text); font-weight:700; }
.t-chg { font-weight:600; font-size:11px; }
.up   { color:var(--green); }
.down { color:var(--red); }

/* ── Main grid ── */
.main {
  padding: 20px 22px 50px;
  display: grid;
  gap: 14px;
  grid-template-columns: repeat(3,1fr);
  max-width: 1380px;
  margin: 0 auto;
  position:relative; z-index:1;
}
.s2 { grid-column:span 2; }
.s3 { grid-column:span 3; }

/* ── Card base ── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  transition: border-color 0.2s, box-shadow 0.2s;
  position:relative;
}
.card:hover {
  border-color: var(--border2);
  box-shadow: 0 0 30px rgba(255,153,51,0.06);
}
/* glowing top accent line per card type */
.card::before {
  content:'';
  position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, transparent, var(--saffron), transparent);
  opacity:0;
  transition: opacity 0.2s;
}
.card:hover::before { opacity:1; }
.card-accent-green::before  { background: linear-gradient(90deg, transparent, var(--green), transparent); }
.card-accent-blue::before   { background: linear-gradient(90deg, transparent, var(--blue), transparent); }
.card-accent-gold::before   { background: linear-gradient(90deg, transparent, #f59e0b, transparent); }

.card-hdr {
  padding: 13px 18px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items:center; justify-content:space-between;
  background: rgba(15,30,55,0.5);
}
.card-title {
  font-size: 10.5px; font-weight:700;
  text-transform:uppercase; letter-spacing:0.14em;
  color: var(--saffron);
  display:flex; align-items:center; gap:7px;
}
.card-title .icon { font-size:13px; }
.card-badge {
  font-family:var(--mono); font-size:9px;
  text-transform:uppercase; letter-spacing:0.06em;
  color:var(--muted);
  background: rgba(255,153,51,0.06);
  border: 1px solid var(--border);
  padding: 2px 8px; border-radius:20px;
}
.card-body { padding:16px 18px; }

/* ── Skeleton ── */
.sk {
  background: linear-gradient(90deg, rgba(255,153,51,0.04) 25%, rgba(255,153,51,0.1) 50%, rgba(255,153,51,0.04) 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:8px;
}
@keyframes shimmer { 0%{background-position:200% 0;} 100%{background-position:-200% 0;} }

/* ── Markets ── */
.mkt-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:14px 0; border-bottom:1px solid rgba(255,153,51,0.07);
}
.mkt-row:last-child { border-bottom:none; }
.mkt-l { display:flex; align-items:center; gap:12px; }
.mkt-badge {
  width:40px; height:40px; border-radius:10px;
  display:flex; align-items:center; justify-content:center;
  font-size:17px; flex-shrink:0;
  background: rgba(255,153,51,0.1);
  border: 1px solid rgba(255,153,51,0.2);
}
.mkt-name { font-size:14px; font-weight:700; letter-spacing:-0.01em; }
.mkt-sub  { font-size:10.5px; color:var(--muted); margin-top:2px; }
.mkt-price { font-family:var(--mono); font-size:22px; font-weight:800; text-align:right; letter-spacing:-0.02em; }
.mkt-chg   { font-family:var(--mono); font-size:12px; font-weight:600; text-align:right; margin-top:4px; }
.mkt-pill {
  display:inline-flex; align-items:center; gap:4px;
  padding:3px 9px; border-radius:20px; font-size:11px; font-weight:700;
}
.mkt-pill.up   { background:rgba(34,197,94,0.12);  color:var(--green); }
.mkt-pill.down { background:rgba(244,63,94,0.12);  color:var(--red); }

/* ── Shared data row ── */
.data-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:10px 0; border-bottom:1px solid rgba(255,153,51,0.07);
}
.data-row:last-child { border-bottom:none; }
.data-l { display:flex; align-items:center; gap:10px; }
.data-icon {
  width:32px; height:32px; border-radius:8px;
  display:flex; align-items:center; justify-content:center;
  font-size:14px; flex-shrink:0;
}
.data-name { font-size:12.5px; font-weight:700; }
.data-sub  { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:1px; }
.data-r    { text-align:right; }
.data-price{ font-family:var(--mono); font-size:14px; font-weight:700; }
.data-pill {
  display:inline-flex; align-items:center; gap:3px;
  padding:2px 7px; border-radius:20px; font-size:10.5px; font-weight:700;
  margin-top:3px; font-family:var(--mono);
}
.data-pill.up   { background:rgba(34,197,94,0.12);  color:var(--green); }
.data-pill.down { background:rgba(244,63,94,0.12);  color:var(--red); }

/* ── Forex ── */
.fx-flag { font-size:18px; flex-shrink:0; }
.fx-pair { font-size:12.5px; font-weight:700; }
.fx-sub  { font-family:var(--mono); font-size:10px; color:var(--muted); margin-top:1px; }
.fx-rate { font-family:var(--mono); font-size:16px; font-weight:800; }

/* ── Crypto ── */
.cx-icon {
  width:34px; height:34px; border-radius:50%;
  display:flex; align-items:center; justify-content:center;
  font-size:15px; flex-shrink:0;
}

/* ── Weather ── */
.wx-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; }
.wx-card {
  background: linear-gradient(145deg, rgba(10,22,40,0.9), rgba(15,30,55,0.8));
  border: 1px solid var(--border);
  border-radius:14px; padding:20px 12px 16px;
  text-align:center;
  transition: border-color 0.2s, transform 0.2s;
  position:relative; overflow:hidden;
}
.wx-card:hover { border-color:var(--border2); transform:translateY(-2px); }
.wx-card::before {
  content:'';
  position:absolute; top:0; left:50%; transform:translateX(-50%);
  width:60%; height:1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
}
.wx-city {
  font-size:10px; font-weight:800; color:var(--muted2);
  text-transform:uppercase; letter-spacing:0.12em; margin-bottom:12px;
}
.wx-emoji { font-size:36px; margin-bottom:8px; line-height:1; display:block; }
.wx-temp  { font-family:var(--mono); font-size:28px; font-weight:800; letter-spacing:-0.02em; }
.wx-deg   { font-size:16px; color:var(--muted2); }
.wx-desc  { font-size:11px; color:var(--muted2); margin-top:6px; line-height:1.4; }
.wx-meta  {
  font-family:var(--mono); font-size:9.5px; color:var(--muted);
  margin-top:10px; display:flex; justify-content:center; gap:12px;
}
.wx-meta span { display:flex; align-items:center; gap:3px; }

/* ── News ── */
.news-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:20px; }
.news-col { }
.news-src {
  display:flex; align-items:center; gap:8px;
  font-size:10px; font-weight:800;
  text-transform:uppercase; letter-spacing:0.12em;
  color:var(--saffron);
  padding-bottom:10px;
  border-bottom: 1px solid var(--border);
  margin-bottom:4px;
}
.news-src-dot {
  width:6px; height:6px; border-radius:50%;
  background:var(--saffron);
  box-shadow: 0 0 6px var(--saffron);
}
.news-item { padding:9px 0; border-bottom:1px solid rgba(255,153,51,0.07); }
.news-item:last-child { border-bottom:none; }
.news-item a {
  font-size:12.5px; line-height:1.5; color:var(--text);
  text-decoration:none; display:block; font-weight:500;
  transition:color 0.15s;
}
.news-item a:hover { color:var(--saffron); }
.news-meta { font-family:var(--mono); font-size:9.5px; color:var(--muted); margin-top:5px; }

/* ── Section card ── */
.section-card {
  background:var(--card); border:1px solid var(--border);
  border-radius:16px; overflow:hidden;
  backdrop-filter:blur(12px); -webkit-backdrop-filter:blur(12px);
}
.section-body { padding:16px 18px; }

/* ── Error ── */
.err {
  color:var(--red); font-family:var(--mono); font-size:11.5px;
  padding:16px; text-align:center;
  background:rgba(244,63,94,0.05); border-radius:8px;
}

/* ── Responsive ── */
@media(max-width:1024px){
  .main{grid-template-columns:1fr 1fr;}
  .s2,.s3{grid-column:span 2;}
  .wx-grid{grid-template-columns:repeat(2,1fr);}
  .news-grid{grid-template-columns:1fr 1fr;}
}
@media(max-width:640px){
  .main{grid-template-columns:1fr;padding:12px 14px 40px;}
  .s2,.s3{grid-column:span 1;}
  .wx-grid{grid-template-columns:repeat(2,1fr);}
  .news-grid{grid-template-columns:1fr;}
  .hdr-sub,.hdr-cd,.live-dot{display:none;}
  .mkt-price{font-size:18px;}
}
</style>
</head>
<body>

<header class="hdr">
  <div class="hdr-l">
    <div class="hdr-logo">🇮🇳</div>
    <div>
      <div class="hdr-title">India <em>Monitor</em></div>
      <div class="hdr-sub">Real-time dashboard</div>
    </div>

<script>
const GET = url => 'https://api.allorigins.win/get?url=' + encodeURIComponent(url);
const YF_PROXIES = [
  url => 'https://corsproxy.io/?'                   + encodeURIComponent(url),
  url => 'https://api.codetabs.com/v1/proxy?quest=' + encodeURIComponent(url),
  url => 'https://api.allorigins.win/raw?url='      + encodeURIComponent(url),
];

// ── Formatters ────────────────────────────────────────────
function fmtINR(n) {
  if (n == null || isNaN(n)) return '—';
  if (n >= 1e7) return '₹' + (n / 1e7).toFixed(2) + ' Cr';
  if (n >= 1e5) return '₹' + (n / 1e5).toFixed(2) + ' L';
  return '₹' + new Intl.NumberFormat('en-IN').format(Math.round(n));
}
function fmtNum(n) {
  if (n == null || isNaN(n)) return '—';
  return new Intl.NumberFormat('en-IN').format(Math.round(n));
}
function fmtPct(n) {
  if (n == null || isNaN(n)) return '';
  return (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
}
function cls(n)   { return n == null ? '' : (n >= 0 ? 'up' : 'down'); }
function arrow(n) { return n == null ? '' : (n >= 0 ? '▲' : '▼'); }

function wxEmoji(desc) {
  const d = (desc || '').toLowerCase();
  if (d.includes('thunder') || d.includes('storm'))         return '⛈️';
  if (d.includes('heavy rain') || d.includes('torrential')) return '🌧️';
  if (d.includes('drizzle') || d.includes('light rain'))    return '🌦️';
  if (d.includes('rain') || d.includes('shower'))           return '🌧️';
  if (d.includes('fog') || d.includes('mist'))              return '🌫️';
  if (d.includes('snow'))                                   return '❄️';
  if (d.includes('partly') || d.includes('overcast'))       return '⛅';
  if (d.includes('cloud'))                                  return '☁️';
  if (d.includes('sun') || d.includes('clear'))             return '☀️';
  return '🌡️';
}
function relTime(str) {
  if (!str) return '';
  const d = new Date(str);
  if (isNaN(d)) return '';
  const m = Math.round((Date.now() - d) / 60000);
  if (m < 2)    return 'just now';
  if (m < 60)   return m + 'm ago';
  if (m < 1440) return Math.round(m / 60) + 'h ago';
  return Math.round(m / 1440) + 'd ago';
}
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s ?? '';
  return d.innerHTML;
}

// ── Fetch helpers ─────────────────────────────────────────
async function fetchJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(res.status);
  return res.json();
}
async function fetchRSS(feedUrl) {
  const res  = await fetch(GET(feedUrl));
  const data = await res.json();
  const xml  = new DOMParser().parseFromString(data.contents, 'text/xml');
  if (xml.querySelector('parsererror')) throw new Error('XML parse error');
  const items = xml.querySelectorAll('item');
  const out = [];
  items.forEach(item => {
    const title = item.querySelector('title')?.textContent?.trim();
    let link = item.querySelector('link')?.textContent?.trim()
            || item.querySelector('link')?.getAttribute('href')
            || item.querySelector('guid')?.textContent?.trim() || '';
    if (!link) {
      const m = item.innerHTML.match(/<link[^>]*>([^<]+)<\/link>/i);
      if (m) link = m[1].trim();
    }
    const pub = item.querySelector('pubDate')?.textContent?.trim() || '';
    if (title && title.length > 5) out.push({ title, link, pub });
  });
  return out.slice(0, 7);
}

// ── API loaders ───────────────────────────────────────────
async function loadYahooChart(symbol) {
  const yfUrl = 'https://query2.finance.yahoo.com/v8/finance/chart/'
    + encodeURIComponent(symbol) + '?interval=1d&range=1d';
  for (const makeProxy of YF_PROXIES) {
    try {
      const controller = new AbortController();
      const tid = setTimeout(() => controller.abort(), 7000);
      const res = await fetch(makeProxy(yfUrl), { signal: controller.signal });
      clearTimeout(tid);
      if (!res.ok) continue;
      const d    = await res.json();
      const meta = d.chart?.result?.[0]?.meta;
      if (!meta?.regularMarketPrice) continue;
      const price     = meta.regularMarketPrice;
      const prev      = meta.previousClose || meta.chartPreviousClose || price;
      const change    = price - prev;
      const changePct = prev ? (change / prev) * 100 : 0;
      return { symbol, shortName: meta.shortName || symbol, regularMarketPrice: price, regularMarketChange: change, regularMarketChangePercent: changePct };
    } catch (_) {}
  }
  throw new Error('All proxies failed for ' + symbol);
}
async function loadYahooQuotes(symbolList) {
  const syms    = symbolList.split(',').map(s => s.trim());
  const results = await Promise.allSettled(syms.map(s => loadYahooChart(s)));
  return results.filter(r => r.status === 'fulfilled').map(r => r.value);
}
async function loadForex() {
  const d = await fetchJSON('https://api.frankfurter.app/latest?from=INR&to=USD,EUR,GBP,JPY,AED');
  const out = {};
  for (const [cur, rate] of Object.entries(d.rates || {})) out[cur] = 1 / rate;
  return out;
}
function loadCrypto() {
  return fetchJSON(
    'https://api.coingecko.com/api/v3/simple/price' +
    '?ids=bitcoin,ethereum,binancecoin,ripple' +
    '&vs_currencies=inr&include_24hr_change=true'
  );
}
const CITIES_COORDS = {
  'Delhi':     { lat:28.61, lon:77.21 },
  'Mumbai':    { lat:19.08, lon:72.88 },
  'Bengaluru': { lat:12.97, lon:77.59 },
  'Chennai':   { lat:13.08, lon:80.27 },
};
function wmoDesc(code) {
  if (code === 0)   return 'Clear sky';
  if (code <= 2)    return 'Partly cloudy';
  if (code === 3)   return 'Overcast';
  if (code <= 49)   return 'Foggy';
  if (code <= 59)   return 'Drizzle';
  if (code <= 69)   return 'Rainy';
  if (code <= 79)   return 'Snow';
  if (code <= 82)   return 'Rain showers';
  if (code <= 84)   return 'Heavy showers';
  if (code <= 99)   return 'Thunderstorm';
  return 'Unknown';
}
async function loadWeather(city) {
  const { lat, lon } = CITIES_COORDS[city] || {};
  if (!lat) throw new Error('Unknown city');
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weathercode,windspeed_10m,relativehumidity_2m&timezone=Asia%2FKolkata`;
  const d = await fetchJSON(url);
  const c = d.current;
  return { temp:Math.round(c.temperature_2m), humidity:c.relativehumidity_2m, wind:Math.round(c.windspeed_10m), desc:wmoDesc(c.weathercode) };
}

function renderTicker(markets, forex, crypto) {
  const items = [];
  const dotColor = n => n >= 0 ? 'var(--green)' : 'var(--red)';
  markets.forEach(m => {
    const pct = m.regularMarketChangePercent;
    items.push(`<span class="t-item">
      <span class="t-dot" style="background:${dotColor(pct)};box-shadow:0 0 6px ${dotColor(pct)};"></span>
      <span class="t-lbl">${esc(m.shortName || m.symbol)}</span>
      <span class="t-val">${fmtNum(m.regularMarketPrice)}</span>
      <span class="t-chg ${cls(pct)}">${fmtPct(pct)} ${arrow(pct)}</span>
    </span>`);
  });
  const fxShow = { USD:'🇺🇸 USD', EUR:'🇪🇺 EUR', GBP:'🇬🇧 GBP', AED:'🇦🇪 AED' };
  Object.entries(forex).forEach(([cur, rate]) => {
    if (!fxShow[cur]) return;
    items.push(`<span class="t-item">
      <span class="t-lbl">${fxShow[cur]}/INR</span>
      <span class="t-val">₹${rate.toFixed(2)}</span>
    </span>`);
  });
  const cxMeta = { bitcoin:{sym:'BTC',icon:'🟠'}, ethereum:{sym:'ETH',icon:'🔵'} };
  Object.entries(crypto).forEach(([id, d]) => {
    const m = cxMeta[id]; if (!m) return;
    const pct = d.inr_24h_change;
    items.push(`<span class="t-item">
      <span class="t-dot" style="background:${dotColor(pct)};box-shadow:0 0 6px ${dotColor(pct)};"></span>
      <span class="t-lbl">${m.icon} ${m.sym}/INR</span>
      <span class="t-val">${fmtINR(d.inr)}</span>
      <span class="t-chg ${cls(pct)}">${fmtPct(pct)}</span>
    </span>`);
  });
  document.getElementById('ticker').innerHTML = items.join('') + items.join('');
}

// ── Countdown ─────────────────────────────────────────────
let cdTimer;
function startCountdown(secs) {
  clearInterval(cdTimer);
  let s = secs;
  const el = document.getElementById('hdr-cd');
  el.textContent = 'Refresh in ' + s + 's';
  cdTimer = setInterval(() => {
    s--;
    el.textContent = s > 0 ? 'Refresh in ' + s + 's' : '';
    if (s <= 0) { clearInterval(cdTimer); refresh(); }
  }, 1000);
}

// ── Main ──────────────────────────────────────────────────
let busy = false;
async function refresh() {
  if (busy) return;
  busy = true;
  clearInterval(cdTimer);
  document.getElementById('hdr-cd').textContent = 'Loading…';
  document.getElementById('btn-refresh').disabled = true;

  const safe = p => p.catch(() => null);

  const [
    markets, stocks, forex, crypto, commodities,
    wxDelhi, wxMumbai, wxBengaluru, wxChennai,
    ndtv, et, hindu
  ] = await Promise.all([
    loadYahooQuotes('^NSEI,^BSESN')                                    .catch(() => []),
    loadYahooQuotes('RELIANCE.NS,TCS.NS,HDFCBANK.NS,INFY.NS,WIPRO.NS').catch(() => []),
    loadForex()                                                         .catch(() => ({})),
    loadCrypto()                                                        .catch(() => ({})),
    loadYahooQuotes('GC=F,SI=F,CL=F')                                  .catch(() => []),
    safe(loadWeather('Delhi')),
    safe(loadWeather('Mumbai')),
    safe(loadWeather('Bengaluru')),
    safe(loadWeather('Chennai')),
    safe(fetchRSS('https://feeds.feedburner.com/ndtvnews-india-news')),
    safe(fetchRSS('https://economictimes.indiatimes.com/rssfeedsdefault.cms')),
    safe(fetchRSS('https://www.thehindu.com/news/national/?service=rss')),
  ]);

  renderMarkets(markets);
  renderStocks(stocks);
  renderForex(forex);
  renderCrypto(crypto);
  renderCommodities(commodities, forex.USD);
  renderWeather([
    { city:'Delhi',     data:wxDelhi     },
    { city:'Mumbai',    data:wxMumbai    },
    { city:'Bengaluru', data:wxBengaluru },
    { city:'Chennai',   data:wxChennai   },
  ]);
  renderNews([
    { label:'NDTV India',     items:ndtv  },
    { label:'Economic Times', items:et    },
    { label:'The Hindu',      items:hindu },
  ]);
  try { renderTicker(markets, forex, crypto); } catch (_) {}

  document.getElementById('hdr-time').textContent =
    'Updated ' + new Date().toLocaleTimeString('en-IN', { hour:'2-digit', minute:'2-digit', second:'2-digit' });

  busy = false;
  document.getElementById('btn-refresh').disabled = false;
  startCountdown(60);
}

refresh();
